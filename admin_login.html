<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTraverse | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f74ba 0%, #0a5a8e 100%);
            min-height: 100vh;
        }
        .login-card {
            animation: fadeInUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-field:focus {
            transform: scale(1.01);
            box-shadow: 0 0 0 3px rgba(15,116,186,0.2);
            border-color: #0f74ba;
        }
        .login-btn {
            transition: all 0.3s ease;
        }
        .login-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px -5px rgba(0,0,0,0.2); 
        }
        .login-btn.disabled { opacity: 0.7; cursor: not-allowed; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-size: 13px;
        }
        .toast-message.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .modal-enter { animation: modalPop 0.2s ease-out; }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .password-field { position: relative; }
        .password-field input { padding-right: 45px; }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
        }
        .password-toggle:hover { color: #0f74ba; }
        .reset-link-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        .reset-link-box p { font-size: 11px; color: #166534; word-break: break-all; }
        @media (max-width: 640px) {
            .login-card { margin: 16px; padding: 20px !important; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="login-card bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl w-full max-w-sm p-6 border border-white/20">
    
    <div class="text-center mb-6">
        <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="Logo" class="w-16 h-16 mx-auto">
        <h2 class="text-xl font-bold text-gray-800 mt-3">Admin Login</h2>
        <p class="text-gray-500 text-xs mt-1">Sign in to admin dashboard</p>
    </div>
    
    <form id="adminLoginForm">
        <div class="mb-4">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Email Address</label>
            <input type="email" id="adminEmail" 
                   class="input-field w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm"
                   placeholder="admin@geotraverse.com" 
                   value="admin@geotraverse.com"
                   required>
        </div>
        
        <div class="mb-3">
            <label class="block text-xs font-semibold text-gray-700 mb-1">Password</label>
            <div class="password-field relative">
                <input type="password" id="adminPassword" 
                       class="input-field w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm pr-10"
                       placeholder="Enter your password" 
                       value="admin123"
                       required>
                <i class="fas fa-eye password-toggle" onclick="togglePasswordVisibility()"></i>
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-5">
            <label class="flex items-center cursor-pointer">
                <input type="checkbox" id="rememberMe" class="w-3.5 h-3.5 text-blue-600 rounded">
                <span class="ml-1.5 text-xs text-gray-600">Remember me</span>
            </label>
            <button type="button" id="forgotPasswordBtn" class="text-xs text-gray-500 hover:text-blue-600">
                <i class="fas fa-question-circle text-xs"></i> Forgot Password?
            </button>
        </div>
        
        <button type="submit" id="loginBtn" 
                class="login-btn w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
            <i class="fas fa-sign-in-alt text-sm"></i> Sign In
        </button>
    </form>
    
    <div class="text-center mt-5 pt-3 border-t border-gray-100">
        <p class="text-xs text-gray-400"><i class="fas fa-shield-alt mr-1"></i> Secure Admin Portal</p>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-sm overflow-hidden shadow-2xl modal-enter">
        <div class="bg-gradient-to-r from-blue-600 to-blue-800 px-5 py-3">
            <div class="flex justify-between items-center">
                <h3 class="text-base font-bold text-white"><i class="fas fa-key mr-1"></i> Reset Admin Password</h3>
                <button id="closeModalBtn" class="text-white hover:text-gray-200 text-xl">&times;</button>
            </div>
        </div>
        
        <div class="p-5">
            <p class="text-gray-600 mb-3 text-center text-sm">Enter your email address to reset your password.</p>
            <input type="email" id="resetEmail" 
                   class="w-full p-2.5 border border-gray-200 rounded-xl focus:border-blue-500 focus:outline-none mb-3 text-sm"
                   placeholder="admin@geotraverse.com"
                   value="admin@geotraverse.com">
            <button id="sendResetBtn" class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-2.5 rounded-xl font-semibold text-sm">
                <i class="fas fa-paper-plane mr-1"></i> Send Reset Link
            </button>
            
            <div id="resetLinkContainer" class="hidden mt-3 reset-link-box">
                <p class="text-xs font-semibold text-green-700 mb-1">✅ Reset Link Generated:</p>
                <p id="resetLinkText" class="text-xs text-blue-600 break-all"></p>
                <button id="copyResetLinkBtn" class="mt-2 text-xs bg-blue-600 text-white px-2 py-1 rounded hover:bg-blue-700 transition">
                    <i class="fas fa-copy mr-1"></i> Copy Link
                </button>
            </div>
            
            <div id="resetSuccessMessage" class="hidden mt-3 p-3 bg-green-50 rounded-lg">
                <p class="text-xs text-green-700 text-center">✅ Reset link has been sent to your email address!</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Hardcoded admin credentials (in real app, this would be from database)
    const ADMIN_EMAIL = "admin@geotraverse.com";
    const ADMIN_PASSWORD = "admin123";
    
    function togglePasswordVisibility() {
        const input = document.getElementById('adminPassword');
        const icon = document.querySelector('.password-toggle');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    function showToast(message, isError = false) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast-message ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-1"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function shakeElement(element) {
        element.classList.add('shake');
        setTimeout(() => element.classList.remove('shake'), 300);
    }
    
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showToast('✅ Reset link copied to clipboard!');
        }).catch(() => {
            showToast('Failed to copy link', true);
        });
    }
    
    function saveCredentials(email, password, remember) {
        if (remember) {
            localStorage.setItem('admin_remembered_email', email);
            localStorage.setItem('admin_remembered_password', password);
            localStorage.setItem('admin_remember_me', 'true');
        } else {
            localStorage.removeItem('admin_remembered_email');
            localStorage.removeItem('admin_remembered_password');
            localStorage.setItem('admin_remember_me', 'false');
        }
    }
    
    function loadSavedCredentials() {
        const savedEmail = localStorage.getItem('admin_remembered_email');
        const savedPassword = localStorage.getItem('admin_remembered_password');
        const rememberChecked = localStorage.getItem('admin_remember_me') === 'true';
        
        if (savedEmail && rememberChecked) {
            document.getElementById('adminEmail').value = savedEmail;
            if (savedPassword) document.getElementById('adminPassword').value = savedPassword;
            document.getElementById('rememberMe').checked = true;
        }
    }
    
    function handleLogin(email, password, remember) {
        // Validate credentials
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            // Save session
            localStorage.setItem('admin_logged_in', 'true');
            localStorage.setItem('admin_user', JSON.stringify({
                name: 'Admin User',
                email: email,
                role: 'admin',
                loginTime: new Date().toISOString()
            }));
            
            // Save remember me preference
            saveCredentials(email, password, remember);
            
            // Show success message
            showToast('Login successful! Redirecting...');
            
            // Redirect to dashboard
            setTimeout(() => {
                window.location.href = 'admin_dashboard.html';
            }, 1000);
            
            return true;
        } else {
            showToast('Invalid email or password', true);
            shakeElement(document.querySelector('.login-card'));
            return false;
        }
    }
    
    function handleForgotPassword(email) {
        if (email === ADMIN_EMAIL) {
            // Generate a reset token (in real app, this would be saved in database)
            const resetToken = 'reset_' + Math.random().toString(36).substr(2, 16);
            const resetLink = `${window.location.origin}${window.location.pathname.replace('admin_login.html', 'reset_password.html')}?token=${resetToken}&email=${encodeURIComponent(email)}`;
            
            // In a real application, you would send an email here
            // For demo purposes, we'll show the link in the modal
            document.getElementById('resetLinkText').innerHTML = resetLink;
            document.getElementById('resetLinkContainer').classList.remove('hidden');
            document.getElementById('resetSuccessMessage').classList.add('hidden');
            
            showToast('Reset link generated! Check the modal below.');
            return true;
        } else {
            showToast('Email address not found', true);
            return false;
        }
    }
    
    // Check if already logged in
    if (localStorage.getItem('admin_logged_in') === 'true') {
        window.location.href = 'admin_dashboard.html';
    }
    
    // Load saved credentials
    loadSavedCredentials();
    
    // Login form submission
    document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const email = document.getElementById('adminEmail').value.trim();
        const password = document.getElementById('adminPassword').value;
        const remember = document.getElementById('rememberMe').checked;
        
        if (!email || !password) {
            showToast('Please enter email and password', true);
            return;
        }
        
        // Disable button and show loading
        const btn = document.getElementById('loginBtn');
        const originalHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span class="ml-2">Signing in...</span>';
        
        // Simulate network delay
        setTimeout(() => {
            handleLogin(email, password, remember);
            btn.disabled = false;
            btn.innerHTML = originalHTML;
        }, 500);
    });
    
    // Enter key press
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
        }
    });
    
    // Forgot Password Modal
    const modal = document.getElementById('forgotModal');
    const forgotBtn = document.getElementById('forgotPasswordBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const sendBtn = document.getElementById('sendResetBtn');
    const resetEmail = document.getElementById('resetEmail');
    const copyBtn = document.getElementById('copyResetLinkBtn');
    
    forgotBtn.onclick = () => {
        resetEmail.value = document.getElementById('adminEmail').value;
        document.getElementById('resetLinkContainer').classList.add('hidden');
        document.getElementById('resetSuccessMessage').classList.add('hidden');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
    };
    
    closeBtn.onclick = () => {
        modal.classList.add('hidden');
        modal.classList.remove('flex');
    };
    
    modal.onclick = (e) => {
        if (e.target === modal) closeBtn.click();
    };
    
    sendBtn.onclick = () => {
        const email = resetEmail.value.trim();
        if (!email) {
            showToast('Please enter your email address', true);
            return;
        }
        
        const btn = sendBtn;
        const originalHTML = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span class="ml-2">Sending...</span>';
        
        setTimeout(() => {
            if (handleForgotPassword(email)) {
                document.getElementById('resetSuccessMessage').classList.remove('hidden');
                document.getElementById('resetLinkContainer').classList.add('hidden');
            }
            btn.disabled = false;
            btn.innerHTML = originalHTML;
        }, 500);
    };
    
    copyBtn.onclick = () => {
        const linkText = document.getElementById('resetLinkText').innerText;
        if (linkText) copyToClipboard(linkText);
    };
    
    resetEmail.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendBtn.click();
    });
</script>
</body>
</html>
