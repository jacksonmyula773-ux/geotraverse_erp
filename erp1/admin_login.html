<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTraverse | Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background: linear-gradient(135deg, #0f74ba, #0a5a8e); font-family: 'Inter', sans-serif; }
        .login-card { background: white; border-radius: 24px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2); }
        .btn-login { background: #0f74ba; transition: 0.2s; }
        .btn-login:hover { background: #0a5a8e; transform: translateY(-2px); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="login-card w-full max-w-md p-8">
        <div class="text-center mb-6">
            <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="Logo" class="w-16 h-16 mx-auto mb-3 rounded-full">
            <h1 class="text-2xl font-bold text-gray-800">GeoTraverse</h1>
            <p class="text-gray-500 text-sm">Admin Login</p>
        </div>
        <form id="loginForm" class="space-y-4">
            <div><label class="block text-sm font-medium mb-1">Email</label><input type="email" id="adminEmail" value="admin@geotraverse.com" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></div>
            <div><label class="block text-sm font-medium mb-1">Password</label><input type="password" id="adminPassword" value="admin123" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></div>
            <button type="submit" class="btn-login w-full text-white py-3 rounded-lg font-semibold"><i class="fas fa-sign-in-alt mr-2"></i>Login</button>
        </form>
        <p class="text-center text-xs text-gray-400 mt-4">Default: admin@geotraverse.com / admin123</p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pwd = document.getElementById('adminPassword').value;
            if (email === 'admin@geotraverse.com' && pwd === 'admin123') {
                localStorage.setItem('admin_logged_in', 'true');
                window.location.href = 'admin_dashboard.html';
            } else {
                alert('Invalid email or password!');
            }
        });
    </script>
</body>
</html>
