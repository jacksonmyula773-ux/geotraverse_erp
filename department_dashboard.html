<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoTraverse | Department Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; transition: background 0.3s ease; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e4e4e7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #a1a1aa; border-radius: 10px; }
        
        .sidebar {
            background: linear-gradient(180deg, #0f74ba 0%, #0a5a8e 100%);
            transition: background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 260px;
            z-index: 30;
        }
        
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1.5rem 0.75rem;
            scrollbar-width: thin;
        }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        
        .nav-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        .nav-item.active {
            background-color: rgba(255,255,255,0.12);
            border-left-color: #60a5fa;
        }
        .nav-item.active i { color: #60a5fa; }
        .nav-item:hover:not(.active) { background-color: rgba(255,255,255,0.08); }
        
        .stat-card {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            background: white;
            border-radius: 12px;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
            border-color: #0f74ba;
        }
        
        .project-card {
            transition: all 0.2s;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            background: white;
        }
        .project-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .task-item {
            background: white; border-radius: 12px; padding: 12px;
            margin-bottom: 10px; border-left: 3px solid #0f74ba;
            transition: all 0.2s;
        }
        .task-item:hover { transform: translateX(3px); }
        
        .message-item { transition: all 0.2s; cursor: pointer; }
        .message-item:hover { background-color: #f8fafc; }
        .message-unread { background-color: #eff6ff; border-left: 3px solid #3b82f6; }
        
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; }
        .chat-reply { background-color: #d1fae5; margin-left: auto; }
        .chat-message { background-color: #e5e7eb; }
        
        .report-card {
            transition: all 0.2s;
            cursor: pointer;
        }
        .report-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .btn-primary { background: linear-gradient(135deg, #0f74ba, #0a5a8e); transition: all 0.2s ease; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(15,116,186,0.3); }
        
        .gradient-text { background: linear-gradient(135deg, #0f74ba, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .scroll-top {
            position: fixed; bottom: 20px; right: 20px;
            background: #0f74ba; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: all 0.3s;
            z-index: 99;
        }
        .scroll-top.visible { opacity: 1; }
        
        .toast-notification {
            position: fixed; bottom: 20px; right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; padding: 12px 20px; border-radius: 8px;
            z-index: 1000; animation: slideInRight 0.3s ease;
        }
        .toast-notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        body.dark-mode { background-color: #0f172a; }
        body.dark-mode .bg-white { background-color: #1e293b; }
        body.dark-mode .text-gray-800, body.dark-mode .text-gray-700 { color: #f1f5f9; }
        body.dark-mode .text-gray-500, body.dark-mode .text-gray-400 { color: #94a3b8; }
        body.dark-mode .stat-card { background-color: #1e293b; border-color: #334155; }
        body.dark-mode .project-card { background-color: #1e293b; }
        body.dark-mode .task-item { background-color: #1e293b; }
        body.dark-mode .chat-message { background-color: #334155; }
        body.dark-mode .chat-message p { color: #f1f5f9; }
        body.dark-mode .chat-reply { background-color: #065f46; }
        
        .main-content { margin-left: 260px; }
        @media (max-width: 768px) {
            .sidebar { left: -260px; transition: left 0.3s; }
            .sidebar.mobile-open { left: 0; }
            .mobile-menu-overlay {
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5); z-index: 99; display: none;
            }
            .mobile-menu-overlay.open { display: block; }
            .main-content { margin-left: 0; }
        }
        
        .report-modal { max-height: 85vh; overflow-y: auto; }
        .status-badge { padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-progress { background: #dbeafe; color: #2563eb; }
        .status-completed { background: #d1fae5; color: #059669; }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
</div>

<div id="mobileMenuOverlay" class="mobile-menu-overlay" onclick="closeMobileSidebar()"></div>

<div id="dashboardApp">
<div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <aside id="mainSidebar" class="sidebar w-64 shadow-xl flex flex-col z-20">
        <div class="px-6 py-6 border-b border-white/20 flex-shrink-0">
            <div class="flex items-center space-x-3">
                <i class="fas fa-map-marked-alt text-white text-2xl"></i>
                <div>
                    <span class="text-xl font-bold text-white">GeoTraverse</span>
                    <p class="text-[10px] text-white/60" id="deptDisplayBadge">Department Portal</p>
                </div>
            </div>
        </div>
        
        <div class="sidebar-nav flex-1 overflow-y-auto">
            <nav class="space-y-1">
                <a href="#" class="nav-item active flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="dashboard">
                    <i class="fas fa-tachometer-alt w-5 text-white/70"></i><span>Dashboard</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="projects">
                    <i class="fas fa-tasks w-5 text-white/70"></i><span>My Projects</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="tasks">
                    <i class="fas fa-check-square w-5 text-white/70"></i><span>My Tasks</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="reports">
                    <i class="fas fa-chart-line w-5 text-white/70"></i><span>My Reports</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="messages">
                    <i class="fas fa-envelope w-5 text-white/70"></i><span>Messages</span>
                    <span class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full" id="unreadMsgBadge">0</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="team">
                    <i class="fas fa-users w-5 text-white/70"></i><span>My Team</span>
                </a>
            </nav>
        </div>
        
        <div class="sidebar-footer flex-shrink-0">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-9 h-9 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full flex items-center justify-center">
                    <i class="fas fa-user text-white text-sm"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-white" id="userName">Loading...</p>
                    <p class="text-xs text-white/70" id="userDept">Department</p>
                </div>
            </div>
            <button id="logoutBtn" class="w-full bg-red-600/80 hover:bg-red-600 text-white py-2 rounded-lg text-sm transition">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </aside>
    
    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto main-content">
        <header class="bg-white shadow-sm px-6 py-4 sticky top-0 z-10 border-b border-gray-200">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center space-x-4">
                    <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-blue-600 transition">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <h1 class="text-xl font-bold gradient-text" id="pageTitle">Department Dashboard</h1>
                </div>
                <div class="flex items-center gap-3">
                    <button id="darkModeToggle" class="text-gray-500 hover:text-blue-600 transition">
                        <i id="darkModeIcon" class="fas fa-moon text-xl"></i>
                    </button>
                </div>
            </div>
        </header>
        
        <div class="p-6" id="mainContentContainer"></div>
    </main>
</div>
</div>

<!-- Generate Report Modal -->
<div id="generateReportModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-4xl modal-pop report-modal">
        <div class="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white">
            <h3 class="text-lg font-bold"><i class="fas fa-file-alt text-purple-500 mr-2"></i>Generate New Report</h3>
            <button onclick="closeGenerateReportModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6" id="generateReportForm">
            <!-- Report form will be loaded here -->
        </div>
    </div>
</div>

<!-- View/Edit Report Modal -->
<div id="viewReportModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-4xl modal-pop report-modal">
        <div class="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white">
            <h3 class="text-lg font-bold" id="viewReportTitle">Report Details</h3>
            <button onclick="closeViewReportModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6" id="viewReportContent"></div>
        <div class="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3">
            <button id="editReportBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-edit mr-2"></i>Edit</button>
            <button id="deleteReportBtn" class="bg-red-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-trash mr-2"></i>Delete</button>
            <button id="submitReportBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-paper-plane mr-2"></i>Submit to Admin</button>
            <button onclick="closeViewReportModal()" class="bg-gray-600 text-white px-4 py-2 rounded-lg">Close</button>
        </div>
    </div>
</div>

<!-- Chat Modal -->
<div id="chatModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-2xl modal-pop">
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold"><i class="fas fa-comments text-blue-500 mr-2"></i>Chat with Admin</h3>
            <button onclick="closeChatModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="h-96 overflow-y-auto p-4 bg-gray-50" id="chatMessagesArea">
            <!-- Chat messages will appear here -->
        </div>
        <div class="p-4 border-t">
            <div class="flex gap-2">
                <textarea id="chatInput" rows="2" placeholder="Type your message here..." class="flex-1 p-2 border rounded-lg resize-none focus:outline-none focus:border-blue-500"></textarea>
                <button onclick="sendChatMessage()" class="bg-blue-600 text-white px-4 py-2 rounded-lg self-end">
                    <i class="fas fa-paper-plane"></i> Send
                </button>
            </div>
        </div>
    </div>
</div>

<script>

                { id: 5, name: "Q1 Financial Audit", client_name: "Internal", amount: "25000000", status: "completed", progress: 100, location: "Head Office", department: "Finance", created_at: "2026-02-15" },

        // Department Tasks
        if (!localStorage.getItem('dept_tasks')) {
            localStorage.setItem('dept_tasks', JSON.stringify([

            ]));
        }
        
        // Department Reports (with draft status)
        if (!localStorage.getItem('dept_reports')) {
            localStorage.setItem('dept_reports', JSON.stringify([
                { id: 1, department: "Management", type: "weekly", title: "Week 15 Progress Report", content: "This week we completed the foundation for Commercial Complex project. All teams are working efficiently.", status: "draft", created_at: "2026-04-18", submitted_at: null },

                { id: 3, department: "Management", type: "weekly", title: "Week 14 Progress Report", content: "Completed Modern Villa project handover. Client is satisfied.", status: "submitted", created_at: "2026-04-11", submitted_at: "2026-04-12" }

    // ==================== HELPER FUNCTIONS ====================
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    function formatDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-GB');
    }
    
    function formatDateTime(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleString('en-GB');
    }
    
    function getStatusBadge(status) {
        if (status === 'completed') return '<span class="status-badge status-completed"><i class="fas fa-check-circle mr-1"></i>Completed</span>';
        if (status === 'in_progress') return '<span class="status-badge status-progress"><i class="fas fa-spinner mr-1"></i>In Progress</span>';
        return '<span class="status-badge status-pending"><i class="fas fa-clock mr-1"></i>Pending</span>';
    }
    
    function addActivityLog(action) {
        let logs = JSON.parse(localStorage.getItem('dept_activity_logs') || '[]');
        logs.unshift({ action: action, department: currentUser.department, created_at: new Date().toISOString() });
        if (logs.length > 50) logs.pop();
        localStorage.setItem('dept_activity_logs', JSON.stringify(logs));
    }
    
    // ==================== RENDER DASHBOARD ====================
    function renderDashboard() {
        const projects = JSON.parse(localStorage.getItem('dept_projects') || '[]');
        const tasks = JSON.parse(localStorage.getItem('dept_tasks') || '[]');
        const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
        const messages = JSON.parse(localStorage.getItem('dept_messages') || '[]');
        const team = JSON.parse(localStorage.getItem('dept_team_members') || '[]');
        
        const deptProjects = projects.filter(p => p.department === currentUser.department);
        const deptTasks = tasks.filter(t => t.department === currentUser.department);
        const deptReports = reports.filter(r => r.department === currentUser.department);
        const deptMessages = messages.filter(m => m.department === currentUser.department);
        const deptTeam = team.filter(t => t.department === currentUser.department);
        const colors = deptColors[currentUser.department] || deptColors["Management"];
        
        const completedTasks = deptTasks.filter(t => t.completed === true).length;
        const pendingTasks = deptTasks.filter(t => t.completed === false).length;

    function openAddTaskModal() {
        const title = prompt('Enter task title:');
        if (!title) return;
        const description = prompt('Enter task description:');
        const due_date = prompt('Enter due date (YYYY-MM-DD):');
        
        const tasks = JSON.parse(localStorage.getItem('dept_tasks') || '[]');
        tasks.push({ id: Date.now(), title, description, department: currentUser.department, completed: false, due_date: due_date || '', created_at: new Date().toISOString().split('T')[0] });
        localStorage.setItem('dept_tasks', JSON.stringify(tasks));
        showToast('Task added successfully');
        renderTasks();
        renderDashboard();
    }
    
    function toggleTask(id) {
        const tasks = JSON.parse(localStorage.getItem('dept_tasks') || '[]');
        const task = tasks.find(t => t.id === id);
        if (task) {
            task.completed = !task.completed;
            localStorage.setItem('dept_tasks', JSON.stringify(tasks));
            showToast(task.completed ? 'Task completed! Great job!' : 'Task reopened');
            renderTasks();
            renderDashboard();
        }
    }

    function collectReportData() {
        const projectsData = [];
        document.querySelectorAll('.project-status-item').forEach(item => {
            const inputs = item.querySelectorAll('input, select');
            if (inputs[0]?.value) {
                projectsData.push({ name: inputs[0].value, progress: inputs[1]?.value, status: inputs[2]?.value });
            }
        });
        
        const challengesData = [];
        document.querySelectorAll('.challenge-item').forEach(item => {
            const inputs = item.querySelectorAll('input, textarea');
            if (inputs[0]?.value) {
                challengesData.push({ challenge: inputs[0].value, solution: inputs[1]?.value });
            }
        });
        
        const assistanceNeeded = [];
        document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
            if (cb.value !== 'other') assistanceNeeded.push(cb.value);
        });
        if (document.getElementById('otherAssistance')?.value) {
            assistanceNeeded.push(document.getElementById('otherAssistance').value);
        }
        
        let departmentSpecific = {};
        if (currentUser.department === 'Finance') {
            departmentSpecific = { totalRevenue: document.getElementById('totalRevenue')?.value, totalExpenses: document.getElementById('totalExpenses')?.value, netProfit: document.getElementById('netProfit')?.value, budgetVsActual: document.getElementById('budgetVsActual')?.value };
        } else if (currentUser.department === 'Sales & Marketing') {
            departmentSpecific = { newClients: document.getElementById('newClients')?.value, totalSales: document.getElementById('totalSales')?.value, activeLeads: document.getElementById('activeLeads')?.value, closedDeals: document.getElementById('closedDeals')?.value };
        } else if (currentUser.department === 'Administration') {
            departmentSpecific = { documentsProcessed: document.getElementById('documentsProcessed')?.value, staffRequests: document.getElementById('staffRequests')?.value, meetingsOrganized: document.getElementById('meetingsOrganized')?.value };
        }
        
        return {
            type: document.getElementById('reportType')?.value || 'weekly',
            period: document.getElementById('reportPeriod')?.value || '',
            title: document.getElementById('reportTitle')?.value || '',
            executiveSummary: document.getElementById('executiveSummary')?.value || '',
            projectsStatus: projectsData,
            tasksCompleted: document.getElementById('tasksCompleted')?.value || '',
            ongoingTasks: document.getElementById('ongoingTasks')?.value || '',
            departmentSpecific: departmentSpecific,
            challenges: challengesData,
            nextPlan: document.getElementById('nextPlan')?.value || '',
            assistanceNeeded: assistanceNeeded,
            additionalComments: document.getElementById('additionalComments')?.value || ''
        };
    }
    
    function saveReportAsDraft() {
        const reportData = collectReportData();
        if (!reportData.title) { showToast('Please enter a report title', true); return; }
        
        const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
        const newReport = {
            id: Date.now(),
            department: currentUser.department,
            type: reportData.type,
            period: reportData.period,
            title: reportData.title,
            content: JSON.stringify(reportData),
            status: 'draft',
            created_at: new Date().toISOString().split('T')[0],
            submitted_at: null
        };
        reports.push(newReport);
        localStorage.setItem('dept_reports', JSON.stringify(reports));
        showToast('Report saved as draft successfully!');
        closeGenerateReportModal();
        renderReports();
        renderDashboard();
    }
    
    function submitReportToAdmin() {
        const reportData = collectReportData();
        if (!reportData.title) { showToast('Please enter a report title', true); return; }
        
        const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
        const newReport = {
            id: Date.now(),
            department: currentUser.department,
            type: reportData.type,
            period: reportData.period,
            title: reportData.title,
            content: JSON.stringify(reportData),
            status: 'submitted',
            created_at: new Date().toISOString().split('T')[0],
            submitted_at: new Date().toISOString()
        };
        reports.push(newReport);
        localStorage.setItem('dept_reports', JSON.stringify(reports));
        addActivityLog(`Submitted report: ${reportData.title}`);
        showToast(`✅ Report "${reportData.title}" submitted to Admin successfully!`);
        closeGenerateReportModal();
        renderReports();
        renderDashboard();
    }
    
    function viewReport(id) {
        const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
        const report = reports.find(r => r.id === id);
        if (!report) return;
        
        currentReportForEdit = report;
        let content = {};
        try { content = JSON.parse(report.content); } catch(e) { content = { executiveSummary: report.content }; }
        
        const colors = deptColors[currentUser.department] || deptColors["Management"];
        
        document.getElementById('viewReportTitle').innerHTML = `${report.type.toUpperCase()} Report: ${escapeHtml(report.title)}`;
        document.getElementById('viewReportContent').innerHTML = `
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3 p-3 ${colors.light} rounded-lg">
                    <div><span class="font-semibold">Department:</span> ${report.department}</div>
                    <div><span class="font-semibold">Report Type:</span> ${report.type}</div>
                    <div><span class="font-semibold">Period:</span> ${content.period || 'N/A'}</div>
                    <div><span class="font-semibold">Created:</span> ${formatDate(report.created_at)}</div>
                    <div><span class="font-semibold">Status:</span> <span class="px-2 py-0.5 rounded-full ${report.status === 'draft' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}">${report.status}</span></div>
                    ${report.submitted_at ? `<div><span class="font-semibold">Submitted:</span> ${formatDateTime(report.submitted_at)}</div>` : ''}
                </div>
                
                <div><h4 class="font-semibold">Executive Summary</h4><div class="p-3 bg-gray-50 rounded-lg">${escapeHtml(content.executiveSummary || 'N/A')}</div></div>
                
                ${content.projectsStatus && content.projectsStatus.length ? `<div><h4 class="font-semibold">Projects Status</h4><div class="space-y-2">${content.projectsStatus.map(p => `<div class="p-2 border rounded-lg">📌 ${escapeHtml(p.name)} - Progress: ${p.progress}% - Status: ${p.status}</div>`).join('')}</div></div>` : ''}
                
                ${content.tasksCompleted ? `<div><h4 class="font-semibold">Tasks Completed</h4><div class="p-3 bg-gray-50 rounded-lg">${escapeHtml(content.tasksCompleted)}</div></div>` : ''}
                ${content.ongoingTasks ? `<div><h4 class="font-semibold">Ongoing Tasks</h4><div class="p-3 bg-gray-50 rounded-lg">${escapeHtml(content.ongoingTasks)}</div></div>` : ''}
                
                ${content.departmentSpecific && Object.keys(content.departmentSpecific).length ? `<div><h4 class="font-semibold">${currentUser.department === 'Finance' ? 'Financial Summary' : currentUser.department === 'Sales & Marketing' ? 'Sales Summary' : 'Administrative Summary'}</h4><div class="grid grid-cols-2 gap-2 p-3 bg-gray-50 rounded-lg">${Object.entries(content.departmentSpecific).map(([k,v]) => `<div><span class="font-semibold">${k}:</span> ${escapeHtml(v) || 'N/A'}</div>`).join('')}</div></div>` : ''}
                
                ${content.challenges && content.challenges.length ? `<div><h4 class="font-semibold">Challenges & Solutions</h4>${content.challenges.map(c => `<div class="p-3 border rounded-lg mb-2"><p class="font-medium">Challenge:</p><p>${escapeHtml(c.challenge)}</p><p class="font-medium mt-2">Solution:</p><p>${escapeHtml(c.solution)}</p></div>`).join('')}</div>` : ''}
                
                ${content.nextPlan ? `<div><h4 class="font-semibold">Next Period Plan</h4><div class="p-3 bg-gray-50 rounded-lg">${escapeHtml(content.nextPlan)}</div></div>` : ''}
                
                ${content.assistanceNeeded && content.assistanceNeeded.length ? `<div><h4 class="font-semibold">Admin Assistance Needed</h4><div class="p-3 bg-gray-50 rounded-lg">${content.assistanceNeeded.map(a => `• ${escapeHtml(a)}`).join('<br>')}</div></div>` : ''}
                
                ${content.additionalComments ? `<div><h4 class="font-semibold">Additional Comments</h4><div class="p-3 bg-gray-50 rounded-lg">${escapeHtml(content.additionalComments)}</div></div>` : ''}
            </div>
        `;
        
        const editBtn = document.getElementById('editReportBtn');
        const deleteBtn = document.getElementById('deleteReportBtn');
        const submitBtn = document.getElementById('submitReportBtn');
        
        if (report.status === 'draft') {
            editBtn.style.display = 'block';
            submitBtn.style.display = 'block';
            deleteBtn.style.display = 'block';
            editBtn.onclick = () => { closeViewReportModal(); editReport(report.id); };
            submitBtn.onclick = () => { submitDraftReport(report.id); };
            deleteBtn.onclick = () => { deleteReport(report.id); };
        } else {
            editBtn.style.display = 'none';
            submitBtn.style.display = 'none';
            deleteBtn.style.display = 'block';
            deleteBtn.onclick = () => { deleteReport(report.id); };
        }
        
        document.getElementById('viewReportModal').classList.remove('hidden');
        document.getElementById('viewReportModal').classList.add('flex');
    }
    
    function editReport(id) {
        const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
        const report = reports.find(r => r.id === id);
        if (!report || report.status !== 'draft') { showToast('Only draft reports can be edited', true); return; }
        
        let content = {};
        try { content = JSON.parse(report.content); } catch(e) { content = { executiveSummary: report.content }; }
        
        document.getElementById('generateReportForm').innerHTML = `
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm font-semibold mb-1">Report Type</label><select id="reportType" class="w-full p-2 border rounded-lg"><option value="daily" ${report.type === 'daily' ? 'selected' : ''}>Daily</option><option value="weekly" ${report.type === 'weekly' ? 'selected' : ''}>Weekly</option><option value="monthly" ${report.type === 'monthly' ? 'selected' : ''}>Monthly</option><option value="quarterly" ${report.type === 'quarterly' ? 'selected' : ''}>Quarterly</option></select></div>
                    <div><label class="block text-sm font-semibold mb-1">Report Period</label><input type="text" id="reportPeriod" value="${escapeHtml(content.period || '')}" class="w-full p-2 border rounded-lg"></div>
                </div>
                <div><label class="block text-sm font-semibold mb-1">Report Title</label><input type="text" id="reportTitle" value="${escapeHtml(report.title)}" class="w-full p-2 border rounded-lg"></div>
                <div><label class="block text-sm font-semibold mb-1">Executive Summary</label><textarea id="executiveSummary" rows="3" class="w-full p-2 border rounded-lg">${escapeHtml(content.executiveSummary || '')}</textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Tasks Completed</label><textarea id="tasksCompleted" rows="2" class="w-full p-2 border rounded-lg">${escapeHtml(content.tasksCompleted || '')}</textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Ongoing Tasks</label><textarea id="ongoingTasks" rows="2" class="w-full p-2 border rounded-lg">${escapeHtml(content.ongoingTasks || '')}</textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Next Period Plan</label><textarea id="nextPlan" rows="3" class="w-full p-2 border rounded-lg">${escapeHtml(content.nextPlan || '')}</textarea></div>
                <div><label class="block text-sm font-semibold mb-1">Additional Comments</label><textarea id="additionalComments" rows="2" class="w-full p-2 border rounded-lg">${escapeHtml(content.additionalComments || '')}</textarea></div>
                <div class="flex gap-3"><button onclick="updateDraftReport(${id})" class="flex-1 bg-blue-600 text-white py-2 rounded-lg">Update Report</button><button onclick="closeGenerateReportModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">Cancel</button></div>
            </div>
        `;
        closeViewReportModal();
        document.getElementById('generateReportModal').classList.remove('hidden');
        document.getElementById('generateReportModal').classList.add('flex');
    }
    
    function updateDraftReport(id) {
        const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
        const index = reports.findIndex(r => r.id === id);
        if (index !== -1) {
            const updatedContent = {
                period: document.getElementById('reportPeriod')?.value || '',
                executiveSummary: document.getElementById('executiveSummary')?.value || '',
                tasksCompleted: document.getElementById('tasksCompleted')?.value || '',
                ongoingTasks: document.getElementById('ongoingTasks')?.value || '',
                nextPlan: document.getElementById('nextPlan')?.value || '',
                additionalComments: document.getElementById('additionalComments')?.value || ''
            };
            reports[index].title = document.getElementById('reportTitle')?.value || reports[index].title;
            reports[index].type = document.getElementById('reportType')?.value || reports[index].type;
            reports[index].content = JSON.stringify(updatedContent);
            localStorage.setItem('dept_reports', JSON.stringify(reports));
            showToast('Report updated successfully');
            closeGenerateReportModal();
            renderReports();
            renderDashboard();
        }
    }
    
    function submitDraftReport(id) {
        if (confirm('Submit this report to Admin? You will not be able to edit it after submission.')) {
            const reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
            const index = reports.findIndex(r => r.id === id);
            if (index !== -1) {
                reports[index].status = 'submitted';
                reports[index].submitted_at = new Date().toISOString();
                localStorage.setItem('dept_reports', JSON.stringify(reports));
                addActivityLog(`Submitted report: ${reports[index].title}`);
                showToast('Report submitted to Admin successfully!');
                closeViewReportModal();
                renderReports();
                renderDashboard();
            }
        }
    }
    
    function deleteReport(id) {
        if (confirm('Are you sure you want to delete this report?')) {
            let reports = JSON.parse(localStorage.getItem('dept_reports') || '[]');
            reports = reports.filter(r => r.id !== id);
            localStorage.setItem('dept_reports', JSON.stringify(reports));
            showToast('Report deleted successfully');
            closeViewReportModal();
            renderReports();
            renderDashboard();
        }
    }
    
    function closeGenerateReportModal() {
        document.getElementById('generateReportModal').classList.add('hidden');
        document.getElementById('generateReportModal').classList.remove('flex');
    }
    
    function closeViewReportModal() {
        document.getElementById('viewReportModal').classList.add('hidden');
        document.getElementById('viewReportModal').classList.remove('flex');
    }
    
    // ==================== MESSAGES & CHAT ====================
    function renderMessages() {
        const messages = JSON.parse(localStorage.getItem('dept_messages') || '[]');
        const deptMessages = messages.filter(m => m.department === currentUser.department);
        
        document.getElementById('messagesSection').innerHTML = `
            <div class="bg-white rounded-xl p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold"><i class="fas fa-envelope mr-2 text-blue-500"></i>Messages with Admin</h3>
                    <button onclick="openChatModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm"><i class="fas fa-plus-circle mr-1"></i>New Message</button>
                </div>
                <div class="space-y-2" id="messagesListArea">
                    ${deptMessages.map(m => `
                        <div class="message-item p-3 rounded-lg ${!m.is_read ? 'message-unread' : 'border'}" onclick="viewConversation(${m.id})">
                            <div class="flex justify-between items-start">
                                <div><p class="font-semibold">${m.from === 'admin' ? 'Admin' : 'Me'}</p><p class="text-sm">${escapeHtml(m.message.substring(0, 80))}${m.message.length > 80 ? '...' : ''}</p><p class="text-xs text-gray-400">${formatDateTime(m.created_at)}</p></div>
                                ${!m.is_read && m.from !== currentUser.department ? '<span class="bg-red-500 text-white text-xs px-2 py-1 rounded-full">New</span>' : ''}
                            </div>
                        </div>
                    `).join('')}
                    ${deptMessages.length === 0 ? '<p class="text-center text-gray-400 py-8">No messages yet. Click "New Message" to chat with Admin.</p>' : ''}
                </div>
            </div>
        `;
    }
    
    function openChatModal() {
        currentChatId = null;
        loadChatMessages();
        document.getElementById('chatModal').classList.remove('hidden');
        document.getElementById('chatModal').classList.add('flex');
    }
    
    function closeChatModal() {
        document.getElementById('chatModal').classList.add('hidden');
        document.getElementById('chatModal').classList.remove('flex');
        renderMessages();
        renderDashboard();
    }
    
    function loadChatMessages() {
        const messages = JSON.parse(localStorage.getItem('dept_messages') || '[]');
        const deptMessages = messages.filter(m => m.department === currentUser.department);
        
        let html = '';
        deptMessages.forEach(msg => {
            html += `<div class="chat-bubble chat-message"><p class="font-semibold text-xs text-gray-500 mb-1">Me (${formatDateTime(msg.created_at)})</p><p>${escapeHtml(msg.message)}</p></div>`;
            msg.replies?.forEach(reply => {
                if (reply.from === 'admin') {
                    html += `<div class="chat-bubble chat-reply"><p class="font-semibold text-xs text-gray-500 mb-1">Admin (${formatDateTime(reply.timestamp)})</p><p>${escapeHtml(reply.message)}</p></div>`;
                } else {
                    html += `<div class="chat-bubble chat-message"><p class="font-semibold text-xs text-gray-500 mb-1">Me (${formatDateTime(reply.timestamp)})</p><p>${escapeHtml(reply.message)}</p></div>`;
                }
            });
        });
        
        if (deptMessages.length === 0) {
            html = '<div class="text-center text-gray-400 py-8">No conversation yet. Send a message to start chatting with Admin.</div>';
        }
        
        document.getElementById('chatMessagesArea').innerHTML = html;
        document.getElementById('chatMessagesArea').scrollTop = document.getElementById('chatMessagesArea').scrollHeight;
    }
    
    function sendChatMessage() {
        const message = document.getElementById('chatInput').value.trim();
        if (!message) { showToast('Please enter a message', true); return; }
        
        const messages = JSON.parse(localStorage.getItem('dept_messages') || '[]');
        const existingChat = messages.find(m => m.department === currentUser.department);
        
        if (existingChat) {
            existingChat.replies.push({ from: currentUser.department, message: message, timestamp: new Date().toISOString() });
            existingChat.is_read = false;
            localStorage.setItem('dept_messages', JSON.stringify(messages));
        } else {
            messages.push({
                id: Date.now(),
                department: currentUser.department,
                from: currentUser.department,
                to: 'admin',
                message: message,
                is_read: false,
                created_at: new Date().toISOString(),
                replies: []
            });
            localStorage.setItem('dept_messages', JSON.stringify(messages));
        }
        
        addActivityLog(`Sent message to Admin: ${message.substring(0, 50)}`);
        showToast('Message sent to Admin');
        document.getElementById('chatInput').value = '';
        loadChatMessages();
        renderDashboard();
    }
    
    function viewConversation(id) {
        const messages = JSON.parse(localStorage.getItem('dept_messages') || '[]');
        const msg = messages.find(m => m.id === id);
        if (msg && !msg.is_read && msg.from !== currentUser.department) {
            msg.is_read = true;
            localStorage.setItem('dept_messages', JSON.stringify(messages));
            renderMessages();
            renderDashboard();
        }
        openChatModal();
    }
    
    // ==================== TEAM SECTION ====================
    function renderTeam() {
        const team = JSON.parse(localStorage.getItem('dept_team_members') || '[]');
        const deptTeam = team.filter(t => t.department === currentUser.department);
        const colors = deptColors[currentUser.department] || deptColors["Management"];
        
        document.getElementById('teamSection').innerHTML = `
            <div class="bg-white rounded-xl shadow-sm p-5">
                <h3 class="font-semibold mb-4"><i class="fas fa-users mr-2 text-green-500"></i>My Team (${deptTeam.length})</h3>
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4">
                    ${deptTeam.map(m => `
                        <div class="border rounded-lg p-4">
                            <div class="flex items-center gap-3 mb-3">
                                <div class="w-12 h-12 ${colors.light} rounded-full flex items-center justify-center"><i class="fas fa-user ${colors.text} text-xl"></i></div>
                                <div><p class="font-semibold">${escapeHtml(m.name)}</p><p class="text-sm text-gray-500">${m.role}</p></div>
                            </div>
                            <div class="space-y-1 text-sm"><p><i class="fas fa-envelope text-gray-400 w-5"></i> ${escapeHtml(m.email)}</p><p><i class="fas fa-phone text-gray-400 w-5"></i> ${m.phone || 'N/A'}</p><p><i class="fas fa-calendar text-gray-400 w-5"></i> Joined: ${formatDate(m.join_date)}</p></div>
                        </div>
                    `).join('')}
                </div>
                ${deptTeam.length === 0 ? '<p class="text-gray-400 text-center py-8">No team members found for your department.</p>' : ''}
            </div>
        `;
    }
    
    // ==================== NAVIGATION ====================
    function showSection(sectionId) {
        const sections = ['dashboardSection', 'projectsSection', 'tasksSection', 'reportsSection', 'messagesSection', 'teamSection'];
        sections.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('hidden'); });
        
        let targetId = '';
        if (sectionId === 'dashboard') targetId = 'dashboardSection';
        else if (sectionId === 'projects') targetId = 'projectsSection';
        else if (sectionId === 'tasks') targetId = 'tasksSection';
        else if (sectionId === 'reports') targetId = 'reportsSection';
        else if (sectionId === 'messages') targetId = 'messagesSection';
        else if (sectionId === 'team') targetId = 'teamSection';
        
        const targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.remove('hidden');
        
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-section="${sectionId}"]`);
        if (activeNav) activeNav.classList.add('active');
        
        const titles = { dashboard: 'Department Dashboard', projects: 'My Projects', tasks: 'My Tasks', reports: 'My Reports', messages: 'Messages', team: 'My Team' };
        document.getElementById('pageTitle').innerText = titles[sectionId] || 'Department Dashboard';
        
        if (sectionId === 'projects') renderProjects();
        else if (sectionId === 'tasks') renderTasks();
        else if (sectionId === 'reports') renderReports();
        else if (sectionId === 'messages') renderMessages();
        else if (sectionId === 'team') renderTeam();
    }
    
    // ==================== INITIAL SETUP ====================
    function init() {
        initializeData();
        
        // Check login
        const loggedInDept = localStorage.getItem('dept_logged_in');
        if (!loggedInDept) {
            window.location.href = 'department_login.html';
            return;
        }
        
        const deptData = JSON.parse(loggedInDept);
        currentUser = { ...currentUser, ...deptData };
        
        document.getElementById('userName').innerText = currentUser.name;
        document.getElementById('userDept').innerText = `${currentUser.department} Department`;
        document.getElementById('deptDisplayBadge').innerText = `${currentUser.department} Portal`;
        
        const container = document.getElementById('mainContentContainer');
        container.innerHTML = `
            <div id="dashboardSection" class=""></div>
            <div id="projectsSection" class="hidden"></div>
            <div id="tasksSection" class="hidden"></div>
            <div id="reportsSection" class="hidden"></div>
            <div id="messagesSection" class="hidden"></div>
            <div id="teamSection" class="hidden"></div>
        `;
        
        renderDashboard();
        
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const section = item.getAttribute('data-section');
                if (section) showSection(section);
            });
        });
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('dept_logged_in');
            window.location.href = 'department_login.html';
        });
        
        if (localStorage.getItem('dept_dark_mode') === 'true') document.body.classList.add('dark-mode');
        document.getElementById('darkModeToggle')?.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dept_dark_mode', document.body.classList.contains('dark-mode'));
        });
        
        document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
            document.getElementById('mainSidebar')?.classList.add('mobile-open');
            document.getElementById('mobileMenuOverlay')?.classList.add('open');
        });
    }
    
    function closeMobileSidebar() {
        document.getElementById('mainSidebar')?.classList.remove('mobile-open');
        document.getElementById('mobileMenuOverlay')?.classList.remove('open');
    }
    
    const scrollBtn = document.createElement('div');
    scrollBtn.className = 'scroll-top';
    scrollBtn.innerHTML = '<i class="fas fa-arrow-up text-white"></i>';
    document.body.appendChild(scrollBtn);
    scrollBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    window.addEventListener('scroll', () => scrollBtn.classList.toggle('visible', window.scrollY > 300));
    
    init();
    
    window.showSection = showSection;
    window.openGenerateReportModal = openGenerateReportModal;
    window.closeGenerateReportModal = closeGenerateReportModal;
    window.saveReportAsDraft = saveReportAsDraft;
    window.submitReportToAdmin = submitReportToAdmin;
    window.addProjectStatusField = addProjectStatusField;
    window.addChallengeField = addChallengeField;
    window.viewReport = viewReport;
    window.deleteReport = deleteReport;
    window.editReport = editReport;
    window.closeViewReportModal = closeViewReportModal;
    window.openAddTaskModal = openAddTaskModal;
    window.toggleTask = toggleTask;
    window.openChatModal = openChatModal;
    window.closeChatModal = closeChatModal;
    window.sendChatMessage = sendChatMessage;
    window.viewConversation = viewConversation;
    window.closeMobileSidebar = closeMobileSidebar;
</script>
</body>
</html>
