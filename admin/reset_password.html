<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTraverse | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f74ba 0%, #0a5a8e 100%);
            min-height: 100vh;
        }
        .reset-card {
            animation: fadeInUp 0.6s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .password-field { position: relative; }
        .password-field input { padding-right: 45px; }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
        }
        .password-toggle:hover { color: #0f74ba; }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
        }
        .toast-message.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="reset-card bg-white rounded-2xl shadow-2xl w-full max-w-md p-6">
        <div class="text-center mb-6">
            <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="Logo" class="w-16 h-16 mx-auto">
            <h2 class="text-xl font-bold text-gray-800 mt-3">Reset Password</h2>
            <p class="text-gray-500 text-xs mt-1">Enter your new password</p>
        </div>
        
        <form id="resetForm">
            <div class="mb-4">
                <label class="block text-xs font-semibold text-gray-700 mb-1">New Password</label>
                <div class="password-field">
                    <input type="password" id="newPassword" 
                           class="w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm pr-10" 
                           placeholder="Enter new password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword')"></i>
                </div>
            </div>
            
            <div class="mb-5">
                <label class="block text-xs font-semibold text-gray-700 mb-1">Confirm Password</label>
                <div class="password-field">
                    <input type="password" id="confirmPassword" 
                           class="w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm pr-10" 
                           placeholder="Confirm new password" required>
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword')"></i>
                </div>
            </div>
            
            <button type="submit" id="resetBtn" 
                    class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-2.5 rounded-xl font-semibold text-sm flex items-center justify-center gap-2">
                <i class="fas fa-key mr-2"></i> Reset Password
            </button>
        </form>
        
        <div class="text-center mt-4">
            <a href="admin_login.html" class="text-xs text-blue-600 hover:text-blue-800">
                <i class="fas fa-arrow-left mr-1"></i> Back to Login
            </a>
        </div>
    </div>
    
    <script>
        const ADMIN_EMAIL = "admin@geotraverse.com";
        const ADMIN_PASSWORD = "admin123";
        
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast-message ${isError ? 'error' : ''}`;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-1"></i>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Get token and email from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        if (!token || !email) {
            showToast('Invalid reset link. Please request a new one.', true);
            setTimeout(() => {
                window.location.href = 'admin_login.html';
            }, 2000);
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword.length < 4) {
                showToast('Password must be at least 4 characters', true);
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('Passwords do not match', true);
                return;
            }
            
            const btn = document.getElementById('resetBtn');
            const originalHTML = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div><span class="ml-2">Resetting...</span>';
            
            // Simulate API call
            setTimeout(() => {
                if (email === ADMIN_EMAIL) {
                    // In a real app, you would update the password in database
                    showToast('Password reset successfully! Please login with your new password.');
                    setTimeout(() => {
                        window.location.href = 'admin_login.html';
                    }, 2000);
                } else {
                    showToast('Invalid request. Please try again.', true);
                    btn.disabled = false;
                    btn.innerHTML = originalHTML;
                }
            }, 1000);
        });
        
        // Enter key press
        document.getElementById('confirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('resetForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
