<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTraverse | Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f74ba 0%, #0a5a8e 100%);
            min-height: 100vh;
        }
        .reset-card {
            animation: fadeInUp 0.6s ease-out;
            backdrop-filter: blur(10px);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast-message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            font-size: 13px;
        }
        .toast-message.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .password-field { position: relative; }
        .password-field input { padding-right: 45px; }
        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #9ca3af;
            transition: color 0.2s;
        }
        .password-toggle:hover { color: #0f74ba; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .shake { animation: shake 0.3s ease-in-out; }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="reset-card bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl w-full max-w-sm p-6 border border-white/20">
    <div class="text-center mb-6">
        <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="Logo" class="w-16 h-16 mx-auto">
        <h2 class="text-xl font-bold text-gray-800 mt-3">Reset Password</h2>
        <p class="text-gray-500 text-xs mt-1">Enter your new password</p>
    </div>
    
    <form id="resetForm">
        <div class="password-field relative mb-4">
            <input type="password" id="newPassword" 
                   class="w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm pr-10"
                   placeholder="New Password" required>
            <i class="fas fa-eye password-toggle" onclick="togglePassword('newPassword')"></i>
        </div>
        <div class="password-field relative mb-4">
            <input type="password" id="confirmPassword" 
                   class="w-full p-2.5 rounded-xl border border-gray-200 focus:border-blue-500 focus:outline-none text-sm pr-10"
                   placeholder="Confirm Password" required>
            <i class="fas fa-eye password-toggle" onclick="togglePassword('confirmPassword')"></i>
        </div>
        <button type="submit" id="resetBtn" 
                class="w-full bg-gradient-to-r from-blue-600 to-blue-800 hover:from-blue-700 hover:to-blue-900 text-white py-2.5 rounded-xl font-semibold text-sm transition">
            Reset Password
        </button>
    </form>
    
    <div class="text-center mt-5 pt-3 border-t border-gray-100">
<a href="admin/login.html" class="text-xs text-gray-400 hover:text-blue-600 transition">
    <i class="fas fa-arrow-left mr-1"></i> Back to Login
</a>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost/geotraverse/backend/api';
    
    // Get token and email from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    const email = urlParams.get('email');
    
    function togglePassword(fieldId) {
        const input = document.getElementById(fieldId);
        const icon = input.nextElementSibling;
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    
    function showToast(message, isError = false) {
        const existingToast = document.querySelector('.toast-message');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = `toast-message ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-1"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function shakeElement(element) {
        element.classList.add('shake');
        setTimeout(() => element.classList.remove('shake'), 300);
    }
    
    // Check if token and email are present
    if (!token || !email) {
        showToast('Invalid reset link. Please request a new one.', true);
        setTimeout(() => { window.location.href = 'admin/login.html'; }, 2000);
    }
    
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const resetBtn = document.getElementById('resetBtn');
        
        if (!newPassword || !confirmPassword) {
            showToast('Please fill in all fields', true);
            shakeElement(document.querySelector('.reset-card'));
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showToast('Passwords do not match', true);
            shakeElement(document.querySelector('.reset-card'));
            return;
        }
        
        if (newPassword.length < 4) {
            showToast('Password must be at least 4 characters', true);
            shakeElement(document.querySelector('.reset-card'));
            return;
        }
        
        resetBtn.disabled = true;
        resetBtn.innerHTML = '<div class="spinner"></div><span class="ml-2">Resetting...</span>';
        
        try {
            const response = await fetch(`${API_BASE}/reset_password.php`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, email, password: newPassword })
            });
            
            const result = await response.json();
            
            if (result.success) {
                showToast('✅ Password reset successfully! Redirecting to login...');
                setTimeout(() => {
                    window.location.href = 'admin/login.html';
                }, 2000);
            } else {
                showToast(result.message || 'Failed to reset password', true);
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Reset Password';
            }
        } catch (error) {
            console.error('Reset error:', error);
            showToast('Connection error. Please try again.', true);
            resetBtn.disabled = false;
            resetBtn.innerHTML = 'Reset Password';
        }
    });
    
    // Enter key support
    document.getElementById('confirmPassword')?.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('resetForm').dispatchEvent(new Event('submit'));
        }
    });
</script>
</body>
</html>
