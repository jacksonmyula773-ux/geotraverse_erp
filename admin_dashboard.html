<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoTraverse | Admin Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; transition: background 0.3s ease; }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #e4e4e7; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #a1a1aa; border-radius: 10px; }
        
        .sidebar {
            background: linear-gradient(180deg, #0f74ba 0%, #0a5a8e 100%);
            transition: background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 260px;
            z-index: 30;
        }
        
        .sidebar-logo-link {
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .sidebar-logo-link:hover {
            opacity: 0.8;
        }
        
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 1.5rem 0.75rem;
            scrollbar-width: thin;
        }
        
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }
        
        .nav-item {
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            cursor: pointer;
        }
        .nav-item.active {
            background-color: rgba(255,255,255,0.12);
            border-left-color: #60a5fa;
        }
        .nav-item.active i { color: #60a5fa; }
        .nav-item:hover:not(.active) { background-color: rgba(255,255,255,0.08); }
        
        .stat-card {
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            background: white;
            border-radius: 12px;
        }
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15);
            border-color: #0f74ba;
        }
        
        .dept-card {
            transition: all 0.3s ease;
            cursor: pointer;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }
        .dept-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        
        .project-card {
            transition: all 0.2s;
            cursor: pointer;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            background: white;
        }
        .project-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .message-item { transition: all 0.2s; cursor: pointer; }
        .message-item:hover { background-color: #f8fafc; }
        .message-unread { background-color: #eff6ff; border-left: 3px solid #3b82f6; }
        
        .chat-bubble { max-width: 80%; padding: 10px 14px; border-radius: 12px; margin-bottom: 8px; }
        .chat-reply { background-color: #d1fae5; margin-left: auto; }
        .chat-message { background-color: #e5e7eb; color: #1a1a1a; }
        .chat-message p { color: #1a1a1a; }
        .chat-reply p { color: #1a1a1a; }
        
        .setting-card {
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid #e5e7eb;
            background: white;
            border-radius: 12px;
        }
        .setting-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-color: #0f74ba;
        }
        
        .color-option {
            transition: all 0.2s;
            cursor: pointer;
            border: 2px solid transparent;
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }
        .color-option:hover { transform: scale(1.1); }
        .color-option.selected { border-color: white; box-shadow: 0 0 0 2px #333; }
        
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-pop { animation: modalPop 0.2s ease-out; }
        
        .toast-notification {
            position: fixed; bottom: 20px; right: 20px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; padding: 12px 20px; border-radius: 8px;
            z-index: 1000; animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .toast-notification.error { background: linear-gradient(135deg, #ef4444, #dc2626); }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        body.dark-mode { background-color: #0f172a; }
        body.dark-mode .bg-white { background-color: #1e293b; }
        body.dark-mode .text-gray-800, body.dark-mode .text-gray-700 { color: #f1f5f9; }
        body.dark-mode .text-gray-500, body.dark-mode .text-gray-400 { color: #94a3b8; }
        body.dark-mode .stat-card { background-color: #1e293b; border-color: #334155; }
        body.dark-mode .setting-card { background-color: #1e293b; border-color: #334155; }
        body.dark-mode .dept-card { background-color: #1e293b; }
        body.dark-mode .chat-message { background-color: #334155; }
        body.dark-mode .chat-message p { color: #f1f5f9; }
        body.dark-mode .chat-reply { background-color: #065f46; }
        body.dark-mode .chat-reply p { color: #f1f5f9; }
        body.dark-mode .project-card { background-color: #1e293b; }
        
        .btn-primary { background: linear-gradient(135deg, #0f74ba, #0a5a8e); transition: all 0.2s ease; cursor: pointer; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 10px 15px -3px rgba(15,116,186,0.3); }
        
        .gradient-text { background: linear-gradient(135deg, #0f74ba, #60a5fa); -webkit-background-clip: text; background-clip: text; color: transparent; }
        
        .scroll-top {
            position: fixed; bottom: 20px; right: 20px;
            background: #0f74ba; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: all 0.3s;
            z-index: 99; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .scroll-top.visible { opacity: 1; }
        
        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 9999;
            display: flex; align-items: center; justify-content: center;
        }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0f74ba;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .task-item {
            background: white; border-radius: 12px; padding: 12px;
            margin-bottom: 10px; border-left: 3px solid #0f74ba;
            transition: all 0.2s;
        }
        .task-item:hover { transform: translateX(3px); }
        
        .employee-row:hover { background-color: #f8fafc; }
        body.dark-mode .employee-row:hover { background-color: #334155; }
        
        .password-field { position: relative; }
        .password-field input { padding-right: 40px; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #9ca3af;
        }
        .password-toggle:hover { color: #0f74ba; }
        
        .main-content { margin-left: 260px; }
        @media (max-width: 768px) {
            .sidebar { left: -260px; transition: left 0.3s; }
            .sidebar.mobile-open { left: 0; }
            .mobile-menu-overlay {
                position: fixed; top: 0; left: 0; right: 0; bottom: 0;
                background: rgba(0,0,0,0.5); z-index: 99; display: none;
            }
            .mobile-menu-overlay.open { display: block; }
            .main-content { margin-left: 0; }
        }
        
        .dept-dashboard-modal, .report-modal {
            max-height: 85vh;
            overflow-y: auto;
        }
        
        .search-results-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            z-index: 50;
            max-height: 400px;
            overflow-y: auto;
            display: none;
        }
        .search-results-dropdown.active { display: block; }
        .search-result-item {
            padding: 12px 16px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-result-item:hover { background-color: #f3f4f6; }
        .dark-mode .search-results-dropdown { background: #1e293b; }
        .dark-mode .search-result-item { border-bottom-color: #334155; }
        .dark-mode .search-result-item:hover { background-color: #334155; }
        
        .home-link-btn {
            transition: all 0.2s;
        }
        .home-link-btn:hover {
            transform: scale(1.05);
        }
        
        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        
        /* Report generation styles */
        .report-type-badge {
            transition: all 0.2s;
        }
        .report-type-badge:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div id="loadingOverlay" class="loading-overlay" style="display: none;">
    <div class="loading-spinner"></div>
</div>

<div id="mobileMenuOverlay" class="mobile-menu-overlay" onclick="closeMobileSidebar()"></div>

<!-- MAIN APP -->
<div id="dashboardApp">
<div class="flex h-screen overflow-hidden">
    
    <!-- SIDEBAR -->
    <aside id="mainSidebar" class="sidebar w-64 shadow-xl flex flex-col z-20">
        <div class="px-6 py-6 border-b border-white/20 flex-shrink-0">
            <div class="sidebar-logo-link flex items-center space-x-3" onclick="goToMainWebsite()">
                <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="GeoTraverse Logo" class="logo-img rounded-lg">
                <div>
                    <span class="text-xl font-bold text-white">GeoTraverse</span>
                    <p class="text-[10px] text-white/60">Admin Dashboard</p>
                </div>
            </div>
        </div>
        
        <div class="sidebar-nav flex-1 overflow-y-auto">
            <nav class="space-y-1">
                <a href="#" class="nav-item active flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="dashboard">
                    <i class="fas fa-tachometer-alt w-5 text-white/70"></i><span>Dashboard</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="employees">
                    <i class="fas fa-users w-5 text-white/70"></i><span>Employees</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="departments">
                    <i class="fas fa-building w-5 text-white/70"></i><span>Department</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="projects">
                    <i class="fas fa-tasks w-5 text-white/70"></i><span>Projects</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="tasks">
                    <i class="fas fa-check-square w-5 text-white/70"></i><span>Tasks</span>
                    <span class="ml-auto bg-orange-500 text-white text-xs px-2 py-0.5 rounded-full" id="pendingTasksBadge">0</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="messages">
                    <i class="fas fa-envelope w-5 text-white/70"></i><span>Messages</span>
                    <span class="ml-auto bg-red-500 text-white text-xs px-2 py-0.5 rounded-full" id="unreadMessagesBadge">0</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="reports">
                    <i class="fas fa-chart-line w-5 text-white/70"></i><span>Reports</span>
                </a>
                <a href="#" class="nav-item flex items-center space-x-3 px-3 py-2.5 rounded-lg text-white" data-section="settings">
                    <i class="fas fa-cog w-5 text-white/70"></i><span>Settings</span>
                </a>
            </nav>
        </div>
        
        <div class="sidebar-footer flex-shrink-0">
            <div class="flex items-center space-x-3 mb-3">
                <div class="w-9 h-9 bg-gradient-to-r from-blue-400 to-purple-400 rounded-full flex items-center justify-center">
                    <i class="fas fa-user text-white text-sm"></i>
                </div>
                <div class="flex-1">
                    <p class="text-sm font-semibold text-white" id="adminName">Admin User</p>
                    <p class="text-xs text-white/70" id="adminEmail">admin@geotraverse.com</p>
                </div>
            </div>
            <button id="logoutBtn" class="w-full bg-red-600/80 hover:bg-red-600 text-white py-2 rounded-lg text-sm transition">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout
            </button>
        </div>
    </aside>
    
    <!-- MAIN CONTENT -->
    <main class="flex-1 overflow-y-auto main-content">
        
        <header class="bg-white shadow-sm px-6 py-4 sticky top-0 z-10 border-b border-gray-200">
            <div class="flex items-center justify-between flex-wrap gap-3">
                <div class="flex items-center space-x-4">
                    <button id="mobileMenuBtn" class="md:hidden text-gray-600 hover:text-blue-600 transition">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                    <button id="homeButton" class="home-link-btn text-gray-600 hover:text-blue-600 transition" onclick="goToMainWebsite()" title="Go to Main Website">
                        <i class="fas fa-home text-xl"></i>
                    </button>
                    <span class="text-sm text-gray-400 hidden md:inline">|</span>
                    <a href="#" onclick="goToMainWebsite(); return false;" class="text-sm text-gray-500 hover:text-blue-600 transition hidden md:inline">
                        <i class="fas fa-globe mr-1"></i> geotraverse.co.tz
                    </a>
                </div>
                <div class="flex-1 max-w-md mx-4 relative">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
                        <input type="text" id="globalSearchInput" placeholder="Global search - employees, projects, tasks, messages, reports..." class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500">
                        <div id="searchResultsDropdown" class="search-results-dropdown"></div>
                    </div>
                </div>
                <button id="darkModeToggle" class="text-gray-500 hover:text-blue-600 transition">
                    <i id="darkModeIcon" class="fas fa-moon text-xl"></i>
                </button>
            </div>
        </header>
        
        <div class="p-6" id="mainContentContainer"></div>
    </main>
</div>
</div>

<!-- Department View Modal (with Report Generation) -->
<div id="deptViewModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-5xl modal-pop dept-dashboard-modal">
        <div class="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white">
            <h3 class="text-lg font-bold" id="deptModalTitle">Department Dashboard</h3>
            <button onclick="closeDeptViewModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6" id="deptViewContent"></div>
    </div>
</div>

<!-- Generate Report Modal -->
<div id="generateReportModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-lg modal-pop">
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold"><i class="fas fa-chart-line text-purple-500 mr-2"></i>Generate New Report</h3>
            <button onclick="closeGenerateReportModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Report Type</label>
                <select id="reportType" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="daily">📅 Daily Report</option>
                    <option value="weekly">📊 Weekly Report</option>
                    <option value="monthly">📈 Monthly Report</option>
                    <option value="quarterly">📉 Quarterly Report</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Report Title</label>
                <input type="text" id="reportTitle" placeholder="e.g., Q1 Financial Summary, Weekly Progress, etc." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Report Content / Details</label>
                <textarea id="reportContent" rows="6" placeholder="Write your report here... Include key achievements, challenges, financial data, project status, etc." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-500"></textarea>
            </div>
            <div class="flex gap-3 pt-3">
                <button onclick="submitDepartmentReport()" class="flex-1 bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition">
                    <i class="fas fa-paper-plane mr-2"></i>Submit Report
                </button>
                <button onclick="closeGenerateReportModal()" class="flex-1 bg-gray-200 py-3 rounded-lg font-semibold">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Start Chat Modal -->
<div id="startChatModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-lg modal-pop">
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold"><i class="fas fa-comment-dots text-blue-500 mr-2"></i>Start New Chat</h3>
            <button onclick="closeStartChatModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-semibold mb-2">Select Department</label>
                <select id="chatDepartment" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="Management">Management Department</option>
                    <option value="Finance">Finance Department</option>
                    <option value="Sales & Marketing">Sales & Marketing Department</option>
                    <option value="Administration">Administration Department</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Message</label>
                <textarea id="chatMessage" rows="5" placeholder="Type your message here..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div class="flex gap-3 pt-3">
                <button onclick="sendNewChatMessage()" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
                    <i class="fas fa-paper-plane mr-2"></i>Send Message
                </button>
                <button onclick="closeStartChatModal()" class="flex-1 bg-gray-200 py-3 rounded-lg font-semibold">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Report View Modal -->
<div id="reportModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-2xl modal-pop report-modal">
        <div class="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white">
            <h3 class="text-lg font-bold" id="reportModalTitle">Report Details</h3>
            <button onclick="closeReportModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6" id="reportModalContent"></div>
        <div class="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3">
            <button onclick="exportReportToPDF()" class="bg-red-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-file-pdf mr-2"></i>Export PDF</button>
            <button onclick="exportReportToExcel()" class="bg-green-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-file-excel mr-2"></i>Export Excel</button>
            <button onclick="closeReportModal()" class="bg-gray-600 text-white px-4 py-2 rounded-lg">Close</button>
        </div>
    </div>
</div>

<!-- Add Project Modal -->
<div id="addProjectModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl w-full max-w-md modal-pop max-h-[90vh] overflow-y-auto">
        <div class="px-6 py-4 border-b flex justify-between items-center sticky top-0 bg-white">
            <h3 class="text-lg font-bold">Add New Project</h3>
            <button onclick="closeAddProjectModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>
        <div class="p-6 space-y-3">
            <input type="text" id="addProjectName" placeholder="Project Name" class="w-full p-2 border rounded-lg" required>
            <input type="text" id="addProjectClient" placeholder="Client Name" class="w-full p-2 border rounded-lg">
            <textarea id="addProjectDesc" rows="3" placeholder="Project Description" class="w-full p-2 border rounded-lg"></textarea>
            <input type="number" id="addProjectAmount" placeholder="Amount (TZS)" class="w-full p-2 border rounded-lg">
            <input type="text" id="addProjectLocation" placeholder="Location" class="w-full p-2 border rounded-lg">
            <select id="addProjectStatus" class="w-full p-2 border rounded-lg">
                <option value="pending">Pending</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="approved">Approved</option>
            </select>
            <input type="number" id="addProjectProgress" placeholder="Progress (0-100%)" class="w-full p-2 border rounded-lg" min="0" max="100">
            <div class="flex gap-3 pt-3">
                <button onclick="saveProjectSubmit()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg">Save Project</button>
                <button onclick="closeAddProjectModal()" class="flex-1 bg-gray-200 py-2 rounded-lg">Cancel</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Project Modal -->
<div id="editProjectModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50 p-4">

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = `toast-notification ${isError ? 'error' : ''}`;
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    
    function formatDate(dateStr) {
        if (!dateStr) return 'Just now';
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        const minutes = Math.floor(diff / 60000);
        if (minutes < 60) return `${minutes} min ago`;
        const hours = Math.floor(diff / 3600000);
        if (hours < 24) return `${hours} hour${hours > 1 ? 's' : ''} ago`;
        return `${Math.floor(hours / 24)} day(s) ago`;
    }
    
    function formatDateFull(dateStr) { if (!dateStr) return 'N/A'; return new Date(dateStr).toLocaleString(); }
    
    function togglePasswordField(fieldId) {
        const input = document.getElementById(fieldId);
        if (!input) return;
        const icon = input.nextElementSibling;
        if (input.type === 'password') { input.type = 'text'; if (icon) icon.classList.remove('fa-eye'); if (icon) icon.classList.add('fa-eye-slash'); }
        else { input.type = 'password'; if (icon) icon.classList.remove('fa-eye-slash'); if (icon) icon.classList.add('fa-eye'); }
    }

        localStorage.setItem('geotraverse_activity_logs', JSON.stringify(logs));
    }

    // ==================== GLOBAL SEARCH ====================
    function performGlobalSearch() {
        const searchTerm = document.getElementById('globalSearchInput').value.toLowerCase().trim();
        const dropdown = document.getElementById('searchResultsDropdown');
        
        if (searchTimeout) clearTimeout(searchTimeout);
        
        if (searchTerm === '') {
            dropdown.classList.remove('active');
            dropdown.innerHTML = '';
            return;
        }
        
        searchTimeout = setTimeout(() => {
            const employees = JSON.parse(localStorage.getItem('geotraverse_employees') || '[]');
            const projects = JSON.parse(localStorage.getItem('geotraverse_projects') || '[]');
            const tasks = JSON.parse(localStorage.getItem('geotraverse_tasks') || '[]');
            const messages = JSON.parse(localStorage.getItem('geotraverse_messages') || '[]');
            const reports = JSON.parse(localStorage.getItem('geotraverse_reports') || '[]');
            
            const empResults = employees.filter(e => e.name.toLowerCase().includes(searchTerm) || e.email.toLowerCase().includes(searchTerm));
            const projResults = projects.filter(p => p.name.toLowerCase().includes(searchTerm) || (p.client_name && p.client_name.toLowerCase().includes(searchTerm)));
            const taskResults = tasks.filter(t => t.title.toLowerCase().includes(searchTerm));
            const msgResults = messages.filter(m => m.message.toLowerCase().includes(searchTerm));
            const repResults = reports.filter(r => r.title.toLowerCase().includes(searchTerm));
            
            let html = '';
            
            if (empResults.length) {
                html += `<div class="p-2 bg-gray-50"><span class="text-xs font-semibold text-blue-600"><i class="fas fa-users mr-1"></i> Employees (${empResults.length})</span></div>`;
                empResults.slice(0, 5).forEach(e => {
                    html += `<div class="search-result-item" onclick="goToSectionAndSearch('employees', '${e.name}')">
                        <div class="font-medium">${escapeHtml(e.name)}</div>
                        <div class="text-xs text-gray-500">${escapeHtml(e.email)} • ${e.role}</div>
                    </div>`;
                });
            }
            
            if (projResults.length) {
                html += `<div class="p-2 bg-gray-50"><span class="text-xs font-semibold text-green-600"><i class="fas fa-building mr-1"></i> Projects (${projResults.length})</span></div>`;
                projResults.slice(0, 5).forEach(p => {
                    html += `<div class="search-result-item" onclick="goToSectionAndSearch('projects', '${p.name}')">
                        <div class="font-medium">${escapeHtml(p.name)}</div>
                        <div class="text-xs text-gray-500">Client: ${escapeHtml(p.client_name || 'N/A')}</div>
                    </div>`;
                });
            }
            
            if (taskResults.length) {
                html += `<div class="p-2 bg-gray-50"><span class="text-xs font-semibold text-orange-600"><i class="fas fa-tasks mr-1"></i> Tasks (${taskResults.length})</span></div>`;
                taskResults.slice(0, 5).forEach(t => {
                    html += `<div class="search-result-item" onclick="goToSectionAndSearch('tasks', '${t.title}')">
                        <div class="font-medium">${escapeHtml(t.title)}</div>
                        <div class="text-xs text-gray-500">${t.department}</div>
                    </div>`;
                });
            }
            
            if (msgResults.length) {
                html += `<div class="p-2 bg-gray-50"><span class="text-xs font-semibold text-blue-600"><i class="fas fa-envelope mr-1"></i> Messages (${msgResults.length})</span></div>`;
                msgResults.slice(0, 5).forEach(m => {
                    html += `<div class="search-result-item" onclick="goToSectionAndSearch('messages', '${m.message.substring(0,30)}')">
                        <div class="font-medium">${escapeHtml(m.message.substring(0,30))}...</div>
                        <div class="text-xs text-gray-500">From: ${m.from_department}</div>
                    </div>`;
                });
            }
            
            if (repResults.length) {
                html += `<div class="p-2 bg-gray-50"><span class="text-xs font-semibold text-purple-600"><i class="fas fa-chart-line mr-1"></i> Reports (${repResults.length})</span></div>`;
                repResults.slice(0, 5).forEach(r => {
                    html += `<div class="search-result-item" onclick="goToSectionAndSearch('reports', '${r.title}')">
                        <div class="font-medium">${escapeHtml(r.title)}</div>
                        <div class="text-xs text-gray-500">From: ${r.from_department}</div>
                    </div>`;
                });
            }
            
            if (html === '') {
                html = `<div class="p-4 text-center text-gray-400"><i class="fas fa-search text-2xl mb-2"></i><p>No results found for "${escapeHtml(searchTerm)}"</p></div>`;
            }
            
            dropdown.innerHTML = html;
            dropdown.classList.add('active');
        }, 300);
    }
    
    function goToSectionAndSearch(section, searchValue) {
        const dropdown = document.getElementById('searchResultsDropdown');
        dropdown.classList.remove('active');
        document.getElementById('globalSearchInput').value = searchValue;
        showSection(section);
        setTimeout(() => {
            if (section === 'employees') renderEmployeesTable();
            else if (section === 'projects') renderProjectsGrid();
            else if (section === 'tasks') renderTasksList();
            else if (section === 'messages') renderMessagesList();
            else if (section === 'reports') renderReportsList();
        }, 100);
        showToast(`Showing results for "${searchValue}"`);
    }
    
    document.addEventListener('click', function(e) {
        const searchInput = document.getElementById('globalSearchInput');
        const dropdown = document.getElementById('searchResultsDropdown');
        if (searchInput && dropdown && !searchInput.contains(e.target) && !dropdown.contains(e.target)) {
            dropdown.classList.remove('active');
        }
    });
    
    // ==================== NAVIGATION ====================
    function showSection(sectionId) {
        const sections = ['dashboardSection', 'employeeSection', 'departmentsSection', 'projectsSection', 'tasksSection', 'messagesSection', 'reportsSection', 'settingsSection'];
        sections.forEach(id => { const el = document.getElementById(id); if (el) el.classList.add('hidden'); });
        
        let targetId = '';
        if (sectionId === 'dashboard') targetId = 'dashboardSection';
        else if (sectionId === 'employees') targetId = 'employeeSection';
        else if (sectionId === 'departments') targetId = 'departmentsSection';
        else if (sectionId === 'projects') targetId = 'projectsSection';
        else if (sectionId === 'tasks') targetId = 'tasksSection';
        else if (sectionId === 'messages') targetId = 'messagesSection';
        else if (sectionId === 'reports') targetId = 'reportsSection';
        else if (sectionId === 'settings') targetId = 'settingsSection';
        
        const targetEl = document.getElementById(targetId);
        if (targetEl) targetEl.classList.remove('hidden');
        
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        const activeNav = document.querySelector(`.nav-item[data-section="${sectionId}"]`);
        if (activeNav) activeNav.classList.add('active');
        
        if (sectionId === 'employees') renderEmployeesTable();
        else if (sectionId === 'projects') renderProjectsGrid();
        else if (sectionId === 'tasks') renderTasksList();
        else if (sectionId === 'messages') renderMessagesList();
        else if (sectionId === 'reports') renderReportsList();
        else if (sectionId === 'departments') renderDepartmentsGrid();
        else if (sectionId === 'settings') loadSettings();
    }

    function sendNewChatMessage() {
        const department = document.getElementById('chatDepartment').value;
        const message = document.getElementById('chatMessage').value.trim();
        
        if (!message) {
            showToast('Please enter a message', true);
            return;
        }
        
        const messages = JSON.parse(localStorage.getItem('geotraverse_messages') || '[]');
        const newMessage = {
            id: Date.now(),
            from_department: department,
            from_user: "Department Staff",
            subject: "New Message from Admin",
            message: message,
            is_read: false,
            created_at: new Date().toISOString(),
            replies: []
        };
        
        messages.push(newMessage);
        localStorage.setItem('geotraverse_messages', JSON.stringify(messages));
        addActivityLog(`Admin started new chat with ${department} department`);
        showToast(`Message sent to ${department} department successfully!`);
        closeStartChatModal();
        renderMessagesList();
        renderDashboard();
        
        setTimeout(() => {
            viewConversation(newMessage.id);
        }, 100);
    }
    
    function viewConversation(id) {
        const messages = JSON.parse(localStorage.getItem('geotraverse_messages') || '[]');
        const msg = messages.find(m => m.id === id);
        if (msg) {
            if (!msg.is_read) {
                msg.is_read = true;
                localStorage.setItem('geotraverse_messages', JSON.stringify(messages));
                renderMessagesList();
                renderDashboard();
            }
            currentSelectedChatId = id;
            
            let chatHtml = `
                <div class="mb-4 pb-4">
                    <div class="flex justify-between items-center mb-3 flex-wrap gap-2">
                        <div>
                            <h3 class="font-bold text-lg">${msg.from_department} Department</h3>
                            <p class="text-sm text-gray-500">Started: ${formatDate(msg.created_at)}</p>
                        </div>
                        <button onclick="deleteMessage(${msg.id})" class="text-red-500 hover:text-red-700 text-sm">
                            <i class="fas fa-trash-alt mr-1"></i> Delete
                        </button>
                    </div>
                    <div class="chat-bubble chat-message">
                        <p class="font-semibold text-xs text-gray-500 mb-1">${msg.from_user || msg.from_department} (${formatDate(msg.created_at)})</p>
                        <p>${escapeHtml(msg.message)}</p>
                    </div>
            `;
            
            msg.replies.forEach(reply => {
                if (reply.from === 'admin') {
                    chatHtml += `<div class="chat-bubble chat-reply">
                        <p class="font-semibold text-xs text-gray-500 mb-1">Admin (${formatDate(reply.timestamp)})</p>
                        <p>${escapeHtml(reply.message)}</p>
                    </div>`;
                } else {
                    chatHtml += `<div class="chat-bubble chat-message">
                        <p class="font-semibold text-xs text-gray-500 mb-1">${escapeHtml(reply.from)} (${formatDate(reply.timestamp)})</p>
                        <p>${escapeHtml(reply.message)}</p>
                    </div>`;
                }
            });
            
            chatHtml += `
                    <div class="mt-6 pt-4 border-t">
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Reply to ${msg.from_department}:</label>
                        <textarea id="replyText" rows="3" placeholder="Type your message..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
                        <div class="flex justify-end mt-3">
                            <button onclick="sendChatReply(${msg.id})" class="btn-primary text-white px-6 py-2 rounded-lg flex items-center gap-2">
                                <i class="fas fa-paper-plane"></i> Send Reply
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('messageDetailView').innerHTML = chatHtml;
        }
    }
    
    function sendChatReply(msgId) {
        const replyText = document.getElementById('replyText')?.value;
        if (!replyText || replyText.trim() === '') {
            showToast('Please enter a message', true);
            return;
        }
        
        const messages = JSON.parse(localStorage.getItem('geotraverse_messages') || '[]');
        const msg = messages.find(m => m.id === msgId);
        if (msg) {
            msg.replies.push({ 
                from: 'admin', 
                message: replyText, 
                timestamp: new Date().toISOString() 
            });
            msg.is_read = false;
            localStorage.setItem('geotraverse_messages', JSON.stringify(messages));
            addActivityLog(`Admin replied to ${msg.from_department} department`);
            showToast(`Reply sent to ${msg.from_department}`);
            renderMessagesList();
            viewConversation(msgId);
        }
    }

            const msg = messages.find(m => m.id === id);
            messages = messages.filter(m => m.id !== id);
            localStorage.setItem('geotraverse_messages', JSON.stringify(messages));
            addActivityLog(`Deleted message from ${msg?.from_department || 'Unknown'} department`);
            showToast('Message conversation deleted');
            renderMessagesList();
            renderDashboard();
            document.getElementById('messageDetailView').innerHTML = `

            `;
        }

    function submitDepartmentReport() {
        const reportType = document.getElementById('reportType').value;
        const reportTitle = document.getElementById('reportTitle').value.trim();
        const reportContent = document.getElementById('reportContent').value.trim();
        
        if (!reportTitle) {
            showToast('Please enter a report title', true);
            return;
        }
        if (!reportContent) {
            showToast('Please enter report content', true);
            return;
        }
        
        const reports = JSON.parse(localStorage.getItem('geotraverse_reports') || '[]');
        const newReport = {
            id: Date.now(),
            from_department: currentDepartmentForReport,
            category: reportType,
            title: reportTitle,
            content: reportContent,
            is_read: false,
            created_at: new Date().toISOString()
        };
        
        reports.push(newReport);
        localStorage.setItem('geotraverse_reports', JSON.stringify(reports));
        addActivityLog(`${currentDepartmentForReport} department submitted report: ${reportTitle}`);
        showToast(`✅ Report "${reportTitle}" submitted successfully to Admin!`);
        closeGenerateReportModal();
        
        // Refresh the department dashboard
        viewDepartmentDashboard(currentDepartmentForReport);
    }

        document.getElementById('mainSidebar').style.background = color;
        document.getElementById('mainSidebar').style.backgroundImage = 'none';
        document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
        if (element) element.classList.add('selected');
        localStorage.setItem('sidebar_color', color);
        showToast('Sidebar color changed');
    }
    
    // BACKUP FUNCTIONS
    function createBackup() {
        const backupData = {
            employees: localStorage.getItem('geotraverse_employees'),
            projects: localStorage.getItem('geotraverse_projects'),
            tasks: localStorage.getItem('geotraverse_tasks'),
            messages: localStorage.getItem('geotraverse_messages'),
            reports: localStorage.getItem('geotraverse_reports'),
            settings: localStorage.getItem('geotraverse_settings'),
            activity_logs: localStorage.getItem('geotraverse_activity_logs'),
            backup_date: new Date().toISOString()
        };
        
        localStorage.setItem('geotraverse_backup', JSON.stringify(backupData));
        
        const backupJson = JSON.stringify(backupData, null, 2);
        const blob = new Blob([backupJson], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `geotraverse_backup_${new Date().toISOString().slice(0,19)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        addActivityLog('Created system backup');
        showToast('✅ Backup created and downloaded successfully!');
    }
    
    function restoreBackup() {
        let backupData = localStorage.getItem('geotraverse_backup');
        
        if (!backupData) {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'application/json';
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const restoredData = JSON.parse(evt.target.result);
                        if (restoredData.employees) localStorage.setItem('geotraverse_employees', restoredData.employees);
                        if (restoredData.projects) localStorage.setItem('geotraverse_projects', restoredData.projects);
                        if (restoredData.tasks) localStorage.setItem('geotraverse_tasks', restoredData.tasks);
                        if (restoredData.messages) localStorage.setItem('geotraverse_messages', restoredData.messages);
                        if (restoredData.reports) localStorage.setItem('geotraverse_reports', restoredData.reports);
                        if (restoredData.settings) localStorage.setItem('geotraverse_settings', restoredData.settings);
                        if (restoredData.activity_logs) localStorage.setItem('geotraverse_activity_logs', restoredData.activity_logs);
                        
                        addActivityLog('Restored system from backup file');
                        showToast('✅ Backup restored successfully! Page will reload.');
                        setTimeout(() => location.reload(), 1500);
                    } catch(err) {
                        showToast('Invalid backup file', true);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
            return;
        }
        
        try {
            const data = JSON.parse(backupData);
            if (data.employees) localStorage.setItem('geotraverse_employees', data.employees);
            if (data.projects) localStorage.setItem('geotraverse_projects', data.projects);
            if (data.tasks) localStorage.setItem('geotraverse_tasks', data.tasks);
            if (data.messages) localStorage.setItem('geotraverse_messages', data.messages);
            if (data.reports) localStorage.setItem('geotraverse_reports', data.reports);
            if (data.settings) localStorage.setItem('geotraverse_settings', data.settings);
            if (data.activity_logs) localStorage.setItem('geotraverse_activity_logs', data.activity_logs);
            
            addActivityLog('Restored system from backup');
            showToast('✅ Backup restored successfully! Page will reload.');
            setTimeout(() => location.reload(), 1500);
        } catch(err) {
            showToast('Error restoring backup', true);
        }
    }
    
    function clearAllLogs() {
        if (confirm('Clear all logs?')) {
            localStorage.setItem('geotraverse_activity_logs', JSON.stringify([]));
            loadSettings();
            showToast('Logs cleared');
        }
    }
    
    function saveGeneralSettings() {
        const settings = {
            company_name: document.getElementById('companyName').value,
            company_email: document.getElementById('companyEmail').value,
            company_phone: document.getElementById('companyPhone').value
        };
        const existing = JSON.parse(localStorage.getItem('geotraverse_settings') || '{}');
        Object.assign(existing, settings);
        localStorage.setItem('geotraverse_settings', JSON.stringify(existing));
        showToast('Settings saved');
    }
    
    function saveEmailConfig() {
        const settings = JSON.parse(localStorage.getItem('geotraverse_settings') || '{}');
        settings.smtp_server = document.getElementById('smtpServer').value;
        settings.smtp_port = document.getElementById('smtpPort').value;
        settings.sender_email = document.getElementById('senderEmail').value;
        localStorage.setItem('geotraverse_settings', JSON.stringify(settings));
        showToast('Email config saved');
    }

            <div id="departmentsSection" class="hidden"></div>
            <div id="projectsSection" class="hidden"></div>
            <div id="tasksSection" class="hidden"></div>
            <div id="messagesSection" class="hidden"></div>

            <div id="settingsSection" class="hidden"></div>
        `;
        
        document.getElementById('adminName').innerText = 'Admin User';
        document.getElementById('adminEmail').innerText = 'admin@geotraverse.com';

        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const section = item.getAttribute('data-section');
                if (section) showSection(section);

        document.getElementById('homeButton')?.addEventListener('click', () => goToMainWebsite());
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            localStorage.removeItem('admin_logged_in');
            window.location.href = 'admin_login.html';
        });
        
        document.getElementById('globalSearchInput')?.addEventListener('input', performGlobalSearch);
        
        const savedColor = localStorage.getItem('sidebar_color');
        if (savedColor) document.getElementById('mainSidebar').style.background = savedColor;
        
        if (localStorage.getItem('dark_mode') === 'true') document.body.classList.add('dark-mode');
        document.getElementById('darkModeToggle')?.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('dark_mode', document.body.classList.contains('dark-mode'));

        });
    }

    const scrollBtn = document.createElement('div');
